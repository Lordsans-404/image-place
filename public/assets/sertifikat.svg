<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="certGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f8f0"/>
      <stop offset="100%" stop-color="#ece8d9"/>
    </linearGradient>
  </defs>
  <!-- Paper -->
  <rect x="20" y="20" width="160" height="130" rx="6" fill="url(#certGrad)" stroke="#d4c99a" stroke-width="2"/>
  <!-- Top decoration line -->
  <rect x="30" y="35" width="140" height="3" rx="1" fill="#c9a84c"/>
  <rect x="30" y="42" width="140" height="1" rx="1" fill="#c9a84c"/>
  <!-- Text lines (decorative) -->
  <rect x="50" y="60" width="100" height="8" rx="4" fill="#c9a84c" opacity="0.4"/>
  <rect x="60" y="76" width="80" height="6" rx="3" fill="#888" opacity="0.25"/>
  <rect x="40" y="90" width="120" height="6" rx="3" fill="#888" opacity="0.2"/>
  <!-- Bottom seal -->
  <circle cx="100" cy="128" r="18" fill="#c9a84c"/>
  <circle cx="100" cy="128" r="14" fill="#f5e87c"/>
  <text x="100" y="133" text-anchor="middle" font-size="14" font-weight="bold" fill="#8B6914">★</text>
  <!-- Ribbon bottom -->
  <polygon points="80,160 100,148 120,160 115,185 100,175 85,185" fill="#e53935"/>
  <polygon points="100,148 120,160 115,185 100,175" fill="#b71c1c"/>
</svg>
